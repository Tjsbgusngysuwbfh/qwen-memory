name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: CLI smoke test
        run: python -m qwen_memory.mem stats

      - name: Regression suite
        run: python tests/test_regression.py

      - name: Experience suite
        run: python tests/test_experience.py

      - name: Budget suite
        run: python tests/test_budget.py

      - name: Trigger suite
        run: python tests/test_trigger.py

      - name: Rollback suite
        run: python tests/test_rollback.py
